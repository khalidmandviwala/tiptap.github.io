<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BroadcastIQ — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=Tajawal:wght@300;400;500;700;800&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
      body {
        background: linear-gradient(
          135deg,
          #ebf2ff 0%,
          #f4f7fc 55%,
          #e8fdf2 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 480px;
        height: 480px;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(10, 110, 255, 0.1) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      body::after {
        content: "";
        position: fixed;
        bottom: 0;
        right: 0;
        width: 380px;
        height: 380px;
        background: radial-gradient(
          circle at 70% 70%,
          rgba(0, 196, 140, 0.09) 0%,
          transparent 70%
        );
        pointer-events: none;
      }
      .wrap {
        width: 100%;
        max-width: 440px;
        position: relative;
        z-index: 1;
      }
      .login-logo {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 11px;
        margin-bottom: 30px;
      }
      .login-card {
        background: #fff;
        border: 1px solid var(--border);
        border-radius: var(--radius-xl);
        box-shadow:
          0 20px 60px rgba(13, 27, 62, 0.12),
          0 0 0 1px rgba(13, 27, 62, 0.04);
        overflow: hidden;
      }
      .lang-pills {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 20px;
      }
      .lang-pill {
        padding: 5px 14px;
        border-radius: 20px;
        border: 1.5px solid var(--border);
        background: transparent;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font-body);
      }
      .lang-pill.active {
        background: var(--brand-light);
        border-color: var(--brand-mid);
        color: var(--brand);
      }
      /* Steps */
      .step-track {
        display: flex;
        padding: 22px 28px 0;
        margin-bottom: 24px;
      }
      .step-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
      }
      .step-item:not(:last-child)::after {
        content: "";
        position: absolute;
        top: 13px;
        left: 50%;
        width: 100%;
        height: 2px;
        background: var(--border);
        z-index: 0;
      }
      .step-item.done:not(:last-child)::after {
        background: var(--green);
      }
      .step-circle {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
        background: var(--surface3);
        color: var(--muted);
        border: 2px solid var(--border);
        position: relative;
        z-index: 1;
        transition: all 0.2s;
      }
      .step-item.done .step-circle {
        background: var(--green);
        border-color: var(--green);
        color: #fff;
      }
      .step-item.active .step-circle {
        background: var(--brand);
        border-color: var(--brand);
        color: #fff;
        box-shadow: 0 0 0 4px rgba(10, 110, 255, 0.15);
      }
      .step-name {
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        margin-top: 5px;
        white-space: nowrap;
      }
      .step-item.active .step-name {
        color: var(--brand);
      }
      .step-item.done .step-name {
        color: var(--green);
      }
      /* Panels */
      .panel {
        display: none;
        padding: 0 28px 30px;
      }
      .panel.active {
        display: block;
      }
      .login-title {
        font-family: var(--font-display);
        font-size: 22px;
        font-weight: 800;
        color: var(--text);
        letter-spacing: -0.3px;
        margin-bottom: 4px;
      }
      .login-sub {
        font-size: 13.5px;
        color: var(--muted);
        margin-bottom: 26px;
        line-height: 1.5;
      }
      .row-between {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
      }
      /* OTP — responsive flex */
      .otp-row {
        display: flex;
        gap: 8px;
        margin-bottom: 22px;
      }
      .otp-box {
        flex: 1;
        min-width: 0;
        text-align: center;
        font-size: 20px;
        font-weight: 800;
        padding: 14px 0;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--surface2);
        color: var(--text);
        outline: none;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        font-family: var(--font-body);
      }
      .otp-box:focus {
        border-color: var(--brand);
        box-shadow: 0 0 0 3px rgba(10, 110, 255, 0.12);
        background: #fff;
      }
      .otp-box.filled {
        border-color: var(--brand);
        background: var(--brand-light);
        color: var(--brand);
      }
      .success-icon {
        width: 72px;
        height: 72px;
        background: var(--green-light);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin: 0 auto 18px;
        border: 3px solid #9fedd7;
      }
      @media (max-width: 400px) {
        .panel {
          padding: 0 16px 24px;
        }
        .step-track {
          padding: 18px 16px 0;
        }
        .otp-row {
          gap: 5px;
        }
        .otp-box {
          font-size: 17px;
          padding: 11px 0;
        }
        .login-title {
          font-size: 19px;
        }
      }
    </style>
  </head>
  <body>
    <script src="assets/js/app.js"></script>
    <div class="wrap">
      <div class="login-logo">
        <div
          class="logo-mark"
          style="width: 42px; height: 42px; font-size: 21px">
          📡
        </div>
        <div class="logo-wordmark" style="font-size: 24px">
          Broadcast<em>IQ</em>
        </div>
      </div>
      <div class="lang-pills">
        <button
          class="lang-pill active"
          onclick="
            applyDir('ltr');
            document
              .querySelectorAll('.lang-pill')
              .forEach((b) => b.classList.remove('active'));
            this.classList.add('active');
          ">
          🇬🇧 English
        </button>
        <button
          class="lang-pill"
          onclick="
            applyDir('rtl');
            document
              .querySelectorAll('.lang-pill')
              .forEach((b) => b.classList.remove('active'));
            this.classList.add('active');
          ">
          🇴🇲 العربية
        </button>
      </div>
      <div class="login-card">
        <div class="step-track">
          <div class="step-item active" id="step1">
            <div class="step-circle">1</div>
            <div class="step-name">Credentials</div>
          </div>
          <div class="step-item" id="step2">
            <div class="step-circle">2</div>
            <div class="step-name">Verify OTP</div>
          </div>
          <div class="step-item" id="step3">
            <div class="step-circle">3</div>
            <div class="step-name">Access</div>
          </div>
        </div>
        <!-- Login -->
        <div class="panel active" id="panelLogin">
          <div class="login-title">Welcome back</div>
          <div class="login-sub">Sign in to your BroadcastIQ account</div>
          <div class="form-group">
            <label class="form-label">Email Address</label>
            <div class="input-wrap">
              <span class="input-icon">✉</span>
              <input
                class="form-control has-icon-start"
                type="email"
                placeholder="you@company.com"
                value="admin@broadcastiq.com" />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <div class="input-wrap">
              <span class="input-icon">🔒</span>
              <input
                class="form-control has-icon-start has-icon-end"
                type="password"
                id="pwdField"
                placeholder="••••••••"
                value="password123" />
              <span
                class="input-icon-end"
                style="cursor: pointer; user-select: none"
                onclick="
                  var f = document.getElementById('pwdField');
                  f.type = f.type === 'password' ? 'text' : 'password';
                "
                >👁</span
              >
            </div>
          </div>
          <div class="row-between">
            <label
              style="
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 13px;
                color: var(--text-2);
                cursor: pointer;
              ">
              <input
                type="checkbox"
                checked
                style="accent-color: var(--brand); width: 15px; height: 15px" />
              Remember me
            </label>
            <a
              href="#"
              style="font-size: 13px; color: var(--brand); font-weight: 600"
              >Forgot password?</a
            >
          </div>
          <button
            class="btn btn-primary"
            style="width: 100%; padding: 13px; font-size: 15px"
            onclick="goOTP()">
            Continue →
          </button>
        </div>
        <!-- OTP -->
        <div class="panel" id="panelOTP">
          <div class="login-title">Verify your identity</div>
          <div class="login-sub">
            6-digit code sent to
            <strong style="color: var(--text)">+968 ●●● ●● 89</strong>
          </div>
          <div class="otp-row">
            <input
              class="otp-box"
              maxlength="1"
              id="o1"
              oninput="nxt(this, 'o2')"
              onkeydown="bk(event, '', 'o1')" />
            <input
              class="otp-box"
              maxlength="1"
              id="o2"
              oninput="nxt(this, 'o3')"
              onkeydown="bk(event, 'o1', 'o2')" />
            <input
              class="otp-box"
              maxlength="1"
              id="o3"
              oninput="nxt(this, 'o4')"
              onkeydown="bk(event, 'o2', 'o3')" />
            <input
              class="otp-box"
              maxlength="1"
              id="o4"
              oninput="nxt(this, 'o5')"
              onkeydown="bk(event, 'o3', 'o4')" />
            <input
              class="otp-box"
              maxlength="1"
              id="o5"
              oninput="nxt(this, 'o6')"
              onkeydown="bk(event, 'o4', 'o5')" />
            <input
              class="otp-box"
              maxlength="1"
              id="o6"
              oninput="nxt(this, '')"
              onkeydown="bk(event, 'o5', 'o6')" />
          </div>
          <button
            class="btn btn-primary"
            style="
              width: 100%;
              padding: 13px;
              font-size: 15px;
              margin-bottom: 14px;
            "
            onclick="goSuccess()">
            Verify & Sign In
          </button>
          <div
            style="text-align: center; font-size: 13px; color: var(--muted)"
            id="resendArea">
            Resend in <strong id="cd" style="color: var(--text)">30</strong>s
          </div>
          <button
            class="btn btn-ghost"
            style="width: 100%; justify-content: center; margin-top: 12px"
            onclick="goBack()">
            ← Back
          </button>
        </div>
        <!-- Success -->
        <div class="panel" id="panelSuccess" style="text-align: center">
          <div class="success-icon">✅</div>
          <div class="login-title" style="text-align: center">You're in!</div>
          <div
            class="login-sub"
            style="text-align: center; margin-bottom: 24px">
            Redirecting to your dashboard…
          </div>
          <button
            class="btn btn-primary"
            style="width: 100%; padding: 13px; font-size: 15px"
            onclick="window.location = 'dashboard.html'">
            Go to Dashboard →
          </button>
        </div>
      </div>
      <div
        style="
          text-align: center;
          margin-top: 18px;
          font-size: 12px;
          color: var(--muted);
        ">
        © 2026 BroadcastIQ · All Rights Reserved by
        <a
          href="https://92techoman.com"
          target="_blank"
          style="color: var(--brand)"
          >92TechOman.com</a
        >
      </div>
    </div>
    <script>
      function setStep(n) {
        for (let i = 1; i <= 3; i++) {
          const s = document.getElementById("step" + i);
          s.classList.remove("active", "done");
          const c = s.querySelector(".step-circle");
          if (i < n) {
            s.classList.add("done");
            c.textContent = "✓";
          } else if (i === n) {
            s.classList.add("active");
            c.textContent = i;
          } else c.textContent = i;
        }
      }
      function goOTP() {
        document.getElementById("panelLogin").classList.remove("active");
        document.getElementById("panelOTP").classList.add("active");
        setStep(2);
        startCD();
        setTimeout(() => document.getElementById("o1").focus(), 100);
      }
      function goBack() {
        document.getElementById("panelOTP").classList.remove("active");
        document.getElementById("panelLogin").classList.add("active");
        setStep(1);
      }
      function goSuccess() {
        document.getElementById("panelOTP").classList.remove("active");
        document.getElementById("panelSuccess").classList.add("active");
        setStep(3);
        document.getElementById("step3").classList.add("done");
        document
          .getElementById("step3")
          .querySelector(".step-circle").textContent = "✓";
      }
      let tmr;
      function startCD() {
        let s = 30;
        const area = document.getElementById("resendArea");
        area.innerHTML = `Resend in <strong id="cd" style="color:var(--text)">${s}</strong>s`;
        clearInterval(tmr);
        tmr = setInterval(() => {
          s--;
          const el = document.getElementById("cd");
          if (el) el.textContent = s;
          if (s <= 0) {
            clearInterval(tmr);
            area.innerHTML = `<a href="#" style="color:var(--brand);font-weight:600" onclick="startCD();return false">Resend Code</a>`;
          }
        }, 1000);
      }
      function nxt(el, nId) {
        el.classList.toggle("filled", el.value !== "");
        if (el.value && nId) document.getElementById(nId).focus();
        if (
          ["o1", "o2", "o3", "o4", "o5", "o6"].every(
            (id) => document.getElementById(id).value !== "",
          )
        )
          setTimeout(goSuccess, 350);
      }
      function bk(e, pId, cId) {
        if (
          e.key === "Backspace" &&
          !document.getElementById(cId).value &&
          pId
        ) {
          document.getElementById(pId).focus();
          document.getElementById(pId).classList.remove("filled");
        }
      }
    </script>
  </body>
</html>
